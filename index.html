<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrizePicks Tennis Fantasy Calculator</title>
    <meta name="description"
        content="Calculate fantasy points for PrizePicks tennis scoring with real-time set-by-set input.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-wrapper">
        <div class="bg-glow"></div>

        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">🎾</div>
                    <div class="logo-text">
                        <h1>PrizePicks</h1>
                        <span>Tennis Fantasy Calculator</span>
                    </div>
                </div>
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <span class="toggle-icon" id="toggle-icon">🌙</span>
                </button>
            </div>
        </header>

        <main class="main-content">

            <div class="scoring-bar" id="scoring-bar">
                <div class="scoring-bar-item pos"><span class="sb-label">Match</span><span class="sb-val">+10</span>
                </div>
                <div class="scoring-bar-item pos"><span class="sb-label">Game W</span><span class="sb-val">+1</span>
                </div>
                <div class="scoring-bar-item neg"><span class="sb-label">Game L</span><span class="sb-val">−1</span>
                </div>
                <div class="scoring-bar-item pos"><span class="sb-label">Set W</span><span class="sb-val">+3</span>
                </div>
                <div class="scoring-bar-item neg"><span class="sb-label">Set L</span><span class="sb-val">−3</span>
                </div>
                <div class="scoring-bar-item pos"><span class="sb-label">Ace</span><span class="sb-val">+0.5</span>
                </div>
                <div class="scoring-bar-item neg"><span class="sb-label">DF</span><span class="sb-val">−0.5</span></div>
            </div>

            <!-- ========== LIVE SCOREBOARD ========== -->
            <section class="scoreboard-card" id="scoreboard-card">
                <div class="sb-header">
                    <div class="sb-player-col">Player</div>
                    <div class="sb-set-headers" id="sb-set-headers">
                        <span>Set 1</span>
                        <span>Set 2</span>
                    </div>
                    <div class="sb-stat-col">Aces</div>
                    <div class="sb-stat-col">Double Faults</div>
                    <div class="sb-pts-col">Fantasy Score</div>
                </div>

                <div class="sb-player-row p1-row" id="p1-row">
                    <div class="sb-player-col">
                        <span class="sb-badge p1">P1</span>
                        <input type="text" class="sb-name" id="player1-name" placeholder="Player 1" value="Player 1">
                    </div>
                    <div class="sb-sets" id="p1-sets">
                        <div class="sb-set-cell">
                            <button class="sb-btn minus" onclick="adj('p1s1',-1)">−</button>
                            <input type="number" class="sb-input" id="p1s1" min="0" max="13" value="0" oninput="calc()">
                            <button class="sb-btn plus" onclick="adj('p1s1',1)">+</button>
                        </div>
                        <div class="sb-set-cell">
                            <button class="sb-btn minus" onclick="adj('p1s2',-1)">−</button>
                            <input type="number" class="sb-input" id="p1s2" min="0" max="13" value="0" oninput="calc()">
                            <button class="sb-btn plus" onclick="adj('p1s2',1)">+</button>
                        </div>
                    </div>
                    <div class="sb-stat-cell">
                        <button class="sb-btn mini minus" onclick="adj('p1ace',-1)">−</button>
                        <input type="number" class="sb-input sm" id="p1ace" min="0" value="0" oninput="calc()">
                        <button class="sb-btn mini plus" onclick="adj('p1ace',1)">+</button>
                    </div>
                    <div class="sb-stat-cell">
                        <button class="sb-btn mini minus" onclick="adj('p1df',-1)">−</button>
                        <input type="number" class="sb-input sm" id="p1df" min="0" value="0" oninput="calc()">
                        <button class="sb-btn mini plus" onclick="adj('p1df',1)">+</button>
                    </div>
                    <div class="sb-pts-cell" id="p1-pts">10.0</div>
                </div>

                <div class="sb-player-row p2-row" id="p2-row">
                    <div class="sb-player-col">
                        <span class="sb-badge p2">P2</span>
                        <input type="text" class="sb-name" id="player2-name" placeholder="Player 2" value="Player 2">
                    </div>
                    <div class="sb-sets" id="p2-sets">
                        <div class="sb-set-cell">
                            <button class="sb-btn minus" onclick="adj('p2s1',-1)">−</button>
                            <input type="number" class="sb-input" id="p2s1" min="0" max="13" value="0" oninput="calc()">
                            <button class="sb-btn plus" onclick="adj('p2s1',1)">+</button>
                        </div>
                        <div class="sb-set-cell">
                            <button class="sb-btn minus" onclick="adj('p2s2',-1)">−</button>
                            <input type="number" class="sb-input" id="p2s2" min="0" max="13" value="0" oninput="calc()">
                            <button class="sb-btn plus" onclick="adj('p2s2',1)">+</button>
                        </div>
                    </div>
                    <div class="sb-stat-cell">
                        <button class="sb-btn mini minus" onclick="adj('p2ace',-1)">−</button>
                        <input type="number" class="sb-input sm" id="p2ace" min="0" value="0" oninput="calc()">
                        <button class="sb-btn mini plus" onclick="adj('p2ace',1)">+</button>
                    </div>
                    <div class="sb-stat-cell">
                        <button class="sb-btn mini minus" onclick="adj('p2df',-1)">−</button>
                        <input type="number" class="sb-input sm" id="p2df" min="0" value="0" oninput="calc()">
                        <button class="sb-btn mini plus" onclick="adj('p2df',1)">+</button>
                    </div>
                    <div class="sb-pts-cell" id="p2-pts">10.0</div>
                </div>

                <div class="sb-add-set" id="sb-add-set">
                    <button class="add-set-btn" id="add-set-btn" onclick="addSet3()">
                        <span class="add-icon">+</span>
                        Add Set 3
                    </button>
                    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
                </div>
            </section>

            <!-- ========== BREAKDOWN — side by side ========== -->
            <section class="breakdown-section" id="breakdown-section">
                <div class="bd-split">
                    <div class="bd-half bd-p1">
                        <div class="bd-player-header">
                            <span class="bd-badge p1">P1</span>
                            <span class="bd-name" id="bd-name-p1">Player 1</span>
                        </div>
                        <div class="bd-rows" id="p1-bd-rows"></div>
                        <div class="bd-total"><span>Total</span><span id="p1-bd-total">10.0</span></div>
                    </div>
                    <div class="bd-divider"></div>
                    <div class="bd-half bd-p2">
                        <div class="bd-player-header">
                            <span class="bd-badge p2">P2</span>
                            <span class="bd-name" id="bd-name-p2">Player 2</span>
                        </div>
                        <div class="bd-rows" id="p2-bd-rows"></div>
                        <div class="bd-total"><span>Total</span><span id="p2-bd-total">10.0</span></div>
                    </div>
                </div>
            </section>

        </main>

        <footer class="footer">
            <p>PrizePicks Fantasy Calculator · For entertainment purposes only</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
